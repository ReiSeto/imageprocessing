<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Enhancer - Batch Web Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .image-card { transition: transform 0.2s; }
        .image-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800 pb-12">
    <div class="max-w-6xl mx-auto p-6">
        <div class="text-center mb-10 mt-8">
            <h1 class="text-4xl font-bold text-indigo-600 mb-2">📸 Batch AI Image Enhancer</h1>
            <p class="text-gray-600">Công cụ tự động Crop (4:5), Upscale (1080x1350) và Hậu kỳ Hàng Loạt.</p>
            <p class="text-xs text-gray-400 mt-2">Xử lý ngay trên máy của bạn, bảo mật 100%.</p>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-6 mb-8 max-w-3xl mx-auto">
            <div class="flex flex-col items-center justify-center border-2 border-dashed border-indigo-300 rounded-lg p-8 hover:bg-indigo-50 transition cursor-pointer" id="dropzone" onclick="document.getElementById('uploadInput').click()">
                <svg class="w-12 h-12 text-indigo-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                <p class="text-indigo-600 font-medium text-lg">Bấm vào đây để chọn nhiều ảnh cùng lúc</p>
                <p class="text-gray-400 text-sm mt-1">Hỗ trợ: .jpg, .png, .heic</p>
                <input type="file" id="uploadInput" class="hidden" accept="image/*,.heic" multiple>
            </div>
            
            <div class="text-center mt-6 flex justify-center gap-4 flex-wrap">
                <button id="processBtn" disabled class="bg-indigo-600 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition transform hover:-translate-y-1">
                    ✨ Xử Lý Tất Cả
                </button>
                <button id="downloadZipBtn" style="display: none;" class="bg-green-500 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:bg-green-600 transition transform hover:-translate-y-1">
                    📦 Tải Tất Cả (.ZIP)
                </button>
            </div>
            <div id="globalLoading" class="hidden text-center mt-4 text-indigo-600 font-medium animate-pulse">
                Đang xử lý hàng loạt, vui lòng không đóng trang... (<span id="progressText">0/0</span>)
            </div>
        </div>

        <!-- Gallery -->
        <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <!-- Items injected by JS -->
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
